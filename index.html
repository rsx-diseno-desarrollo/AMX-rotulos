<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>AMX - Buscador</title>
  <link rel="stylesheet" href="styles.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1E73BE">
</head>
<body>

  <h1>AMX</h1>
  <img src="img/logo.png" alt="Automann" style="max-width:200px; margin-bottom:20px;">

  <div class="container">
    <input list="numeros" id="searchInput" placeholder="Número Nacional">
    <datalist id="numeros"></datalist>
    <button onclick="buscar()">Buscar</button>
  </div>

  <div id="result"></div>

  <!-- Librería XLSX -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <script>
    let data = [];

    // ✅ Cargar Excel
    async function cargarExcel() {

      try {
        const response = await fetch('QAD Automann MEX.xlsx');
        const arrayBuffer = await response.arrayBuffer();
        const workbook = XLSX.read(arrayBuffer, { type: 'array' });

        // ✅ Tomar hoja correcta
        const sheet = workbook.Sheets["Ayuda visual Rotulos"];

        const json = XLSX.utils.sheet_to_json(sheet);
        data = json;

        // Detectar columnas automáticamente
        const columnas = Object.keys(data[0]);
        
        const colNacional = columnas[0];
        const colAutomann = columnas[1];
        const colRotulo = columnas[2];
        const colEtiqueta = columnas[3];
        
        // Guardarlas globales
        window.colNacional = colNacional;
        window.colAutomann = colAutomann;
        window.colRotulo = colRotulo;
        window.colEtiqueta = colEtiqueta;
        
        console.log("Columnas detectadas:", columnas);


        console.log("✅ Datos cargados:", data);

        // ✅ Autocompletado
        const datalist = document.getElementById('numeros');

        data.forEach(item => {
          let option = document.createElement('option');
          option.value = item[colNacional];
          datalist.appendChild(option);
        });

      } catch (error) {
        console.error("❌ Error al cargar Excel:", error);
      }
    }

    cargarExcel();

    // ✅ Buscar
    function buscar() {

      const input = document.getElementById('searchInput').value.trim();
      const resultDiv = document.getElementById('result');

      const resultado = data.find(item =>
  String(item[colNacional]).trim() === input
);

      if (resultado) {

        resultDiv.innerHTML = `
  <div class="card">
    <h3>${resultado[colNacional]}</h3>
    <p><strong>Numero Automann:</strong> ${resultado[colAutomann]}</p>
    <p><strong>Rotulo:</strong> ${resultado[colRotulo]}</p>
    <p><strong>Etiqueta:</strong> ${resultado[colEtiqueta]}</p>
  </div>
`;

      } else {
        resultDiv.innerHTML = "<p>No encontrado</p>";
      }
    }
  </script>

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(() => console.log("✅ Service Worker registrado"))
        .catch(err => console.log("❌ Error SW", err));
    }
  </script>

</body>
</html>
