<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>AMX - Buscador</title>
  <link rel="stylesheet" href="styles.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

  <h1>AMX</h1>
  <img src="logo.png" alt="Automann" style="max-width:200px; margin-bottom:20px;">

  <div class="container">
    <input list="numeros" id="searchInput" placeholder="Número de Parte">
    <button onclick="buscar()">Buscar</button>
  </div>

  <button onclick="buscar()">Buscar</button>

  <div id="result"></div>

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script>
    let data = [];

// Cargar Excel
async function cargarExcel() {
  try {
    const response = await fetch('QAD Automann MEX.xlsx'); // tu archivo
    const arrayBuffer = await response.arrayBuffer();
    const workbook = XLSX.read(arrayBuffer, { type: 'array' });

    //  Usa el nombre de tu hoja
    const sheet = workbook.Sheets["Ayuda visual Rotulos"];

    const json = XLSX.utils.sheet_to_json(sheet);

    data = json;

    console.log("Datos cargados:", data);

    // Autocomplete
    const datalist = document.getElementById('numeros');

    data.forEach(item => {
      let option = document.createElement('option');
      option.value = item["Numero Nacional"]; //  columna real
      datalist.appendChild(option);
    });

  } catch (error) {
    console.error("Error al cargar el Excel:", error);
  }
}

// Ejecutar carga
cargarExcel();

    function buscar() {
      const input = document.getElementById('searchInput').value.trim();
      const resultDiv = document.getElementById('result');

      const resultado = data.find(item =>
  String(item["NO. PARTE"]).trim() === input
);

      if (resultado) {
        resultDiv.innerHTML = `
          <div class="card">
            <h3>${resultado["NO. PARTE"]}</h3>
            <p><strong>Cliente:</strong> ${resultado["CLIENTE"]}</p>
            <p><strong>Nombre:</strong> ${resultado["NOMBRE"]}</p>
            <p><strong>Tipo:</strong> ${resultado["SUBCARPETA"]}</p>

              ${resultado["LIGA"] 
                ? `<p><a href="${resultado["LIGA"]}" target="_blank">Ver PDF</a></p>` 
                : ""
              }

          </div>
        `;
      } else {
        resultDiv.innerHTML = "<p>No encontrado</p>";
      }
    }
  </script>

</body>
</html>
