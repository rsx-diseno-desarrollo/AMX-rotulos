<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>AMX - Buscador</title>
  <link rel="stylesheet" href="styles.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1E73BE">
</head>
<body>

  
  <img src="img/logo-amx.png" alt="AMX" style="max-width:200px; margin-bottom:20px;">
  <h1>Información de rotulos y etiquetas</h1>

  <div class="container">
    <input list="numeros" id="searchInput" placeholder="Número Nacional">
    <datalist id="numeros"></datalist>
    <button onclick="buscar()">Buscar</button>
  </div>

  <div id="result"></div>

  <!-- Librería XLSX -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <script>
    let data = [];

    // ✅ Cargar Excel
    async function cargarExcel() {

      try {
        const response = await fetch('QAD Automann MEX.xlsx');
        const arrayBuffer = await response.arrayBuffer();
        const workbook = XLSX.read(arrayBuffer, { type: 'array' });

        // ✅ Tomar hoja correcta
        const sheet = workbook.Sheets["Ayuda visual Rotulos"];

        const json = XLSX.utils.sheet_to_json(sheet, {
          range: 5
        });
        data = json;

        // Detectar columnas automáticamente
        const columnas = Object.keys(data[0]);

        const colNacional = columnas.find(c => c.toLowerCase().includes("nacional"));
        const colAutomann = columnas.find(c => c.toLowerCase().includes("automann"));
        const colRotulo = columnas.find(c => c.toLowerCase().includes("rotulo") || c.toLowerCase().includes("rótulo"));
        const colEtiqueta = columnas.find(c => c.toLowerCase().includes("etiqueta"));
        
        window.colNacional = colNacional;
        window.colAutomann = colAutomann;
        window.colRotulo = colRotulo;
        window.colEtiqueta = colEtiqueta;
        
        console.log("Mapeo FINAL:", {
          colNacional,
          colAutomann,
          colRotulo,
          colEtiqueta
        });
        
        console.log("✅ Datos cargados:", data);

        // ✅ Autocompletado
        const datalist = document.getElementById('numeros');

        data.forEach(item => {
          let option = document.createElement('option');
          option.value = item[colNacional];
          datalist.appendChild(option);
        });

      } catch (error) {
        console.error("❌ Error al cargar Excel:", error);
      }
    }

    cargarExcel();

    // ✅ Buscar
    function buscar() {

      const input = document.getElementById('searchInput').value.trim();
      const resultDiv = document.getElementById('result');

      const resultado = data.find(item =>
        String(item[colNacional]).trim().toUpperCase() === input.toUpperCase() ||
        String(item[colAutomann]).trim().toUpperCase() === input.toUpperCase()
      );

      if (resultado) {

        resultDiv.innerHTML = `
        <div class="card">
          <h3>${resultado[colNacional]}</h3>
          <p><strong>Numero Automann:</strong> ${resultado[colAutomann]}</p>
          <p><strong>Rotulo:</strong> ${resultado[colRotulo]}</p>
          <p><strong>Etiqueta:</strong> ${resultado[colEtiqueta]}</p>
        </div>
    
          ${resultado[colRotulo] ? `          
            <div class="visual">
              <img src="img/apoyo-visual.png" onclick="abrirImagen(this.src)">
            </div>
          ` : ""}
      `;

      } else {
        resultDiv.innerHTML = "<p>No encontrado</p>";
      }
    }

    function abrirImagen(src) {
    const visor = document.getElementById("visor");
    const visorImg = document.getElementById("visorImg");
  
    visor.style.display = "flex";
    visorImg.src = src;
  }
  
  function cerrarImagen() {
    document.getElementById("visor").style.display = "none";
  }
  </script>

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(() => console.log("✅ Service Worker registrado"))
        .catch(err => console.log("❌ Error SW", err));
    }
  </script>

  <div id="visor" onclick="cerrarImagen()">
  <img id="visorImg">
  </div>

</body>
</html>
